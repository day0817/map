<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本地図 色分け (市区町村)</title>
    <!-- 必要なライブラリの読み込み -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">

        <main>
            <div id="map-container">
                <div id="loading" class="loading">地図データを読み込み中...</div>

                <svg id="map"></svg>
            </div>
            <div class="legend-container">
                <h3>凡例</h3>
                <div class="legend-item">
                    <div class="color-box highlight-dark"></div>
                    <span>指定地域</span>
                </div>
                <div class="legend-item">
                    <div class="color-box highlight-light"></div>
                    <span>その他</span>
                </div>
                <div class="legend-item" style="margin-left: 1rem; padding-left: 1rem; border-left: 1px solid #e2e8f0;">
                    <div class="circle-legend" style="background-color: #f44336;"></div>
                    <span>中核病院小児科</span>
                </div>
                <div class="legend-item">
                    <div class="circle-legend" style="background-color: #2196f3;"></div>
                    <span>地域小児科センター</span>
                </div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>
</html>
